<div class="shell">
  <header class="topbar">
    <a class="brand" routerLink="/articles">Inkline</a>

    <nav class="nav" aria-label="Primary">
      <a routerLink="/articles" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Articles</a>
      @if (isAuthenticated()) {
        <a routerLink="/editor" routerLinkActive="active">New article</a>
        <button type="button" class="ghost-button" (click)="logout()">Logout</button>
      } @else {
        <a routerLink="/login" routerLinkActive="active">Login</a>
        <a routerLink="/register" routerLinkActive="active">Register</a>
      }
    </nav>

    @if (currentUser()) {
      <div class="account-chip" aria-label="Signed in user">
        <span class="dot"></span>
        <span>{{ currentUser()?.name }}</span>
      </div>
    }
  </header>

  <main class="page-frame">
    <router-outlet></router-outlet>
  </main>
</div>
